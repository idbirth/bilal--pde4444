seed: 42
image_ext: ".jpg"
target_size: [224, 224] # size to which images will be resized before augmentation
classes:
  defective:
    min_output_images: 250 
    per_source_variants: 6
    pipeline:
      resize_first: true
      transforms:
        - name: RotationSweep
          start_deg: 0
          end_deg: 359
          step_deg: 1
        # Previous random rotation-only setting kept for reference:
        # - name: Affine
